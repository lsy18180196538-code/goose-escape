  ctx.beginPath(); ctx.ellipse(0, 12*s, 22*s, 5*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = alpha;

  ctx.translate(0, bob);

  // 双腿
  [-7, 7].forEach((lx, li) => {
    const swing = li === 0 ? legSwing : -legSwing;
    ctx.save(); ctx.translate(lx*s, -5*s); ctx.rotate(swing * 0.05);
    ctx.fillStyle = '#ff8800';
    ctx.beginPath(); ctx.roundRect(-3*s, 0, 6*s, 14*s, 2*s); ctx.fill();
    ctx.fillStyle = '#ff6600';
    ctx.beginPath(); ctx.ellipse(0, 14*s, 6*s, 3*s, 0, 0, Math.PI*2); ctx.fill();
    [-2,0,2].forEach(cx=>{
      ctx.strokeStyle='#cc4400'; ctx.lineWidth=0.7*s;
      ctx.beginPath(); ctx.moveTo(cx*s, 12*s); ctx.lineTo((cx+0.8)*s, 17*s); ctx.stroke();
    });
    ctx.restore();
  });

  // 破烂披风（背后剧烈飘动，sin波形多段摆动）
  const capeFlow = Math.sin(pharaoh.robeFlow) * 5 * s;
  const capeFlow2 = Math.sin(pharaoh.robeFlow * 1.7 + 0.8) * 3 * s;
  const capeSway = Math.sin(pharaoh.robeFlow * 2.3) * 2 * s;
  ctx.fillStyle = '#0d0d0d';
  ctx.beginPath();
  ctx.moveTo(-18*s, -40*s);
  ctx.quadraticCurveTo(-28*s + capeFlow, -10*s, -22*s + capeFlow, 12*s);
  for(let zi=0; zi<5; zi++){
    const zx = -22*s + capeFlow + zi*4.4*s;
    ctx.lineTo(zx + 2.2*s, 15*s);
    ctx.lineTo(zx + 4.4*s, 8*s);
  }
  ctx.lineTo(22*s - capeFlow, 12*s);
  ctx.quadraticCurveTo(28*s - capeFlow, -10*s, 18*s, -40*s);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(180,140,20,0.55)'; ctx.lineWidth = 1.5*s;
  ctx.beginPath(); ctx.moveTo(-18*s,-40*s); ctx.quadraticCurveTo(-28*s+capeFlow,-10*s,-22*s+capeFlow,12*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(18*s,-40*s); ctx.quadraticCurveTo(28*s-capeFlow,-10*s,22*s-capeFlow,12*s); ctx.stroke();

  // 身体（黑色椭圆）
  const bodyG = ctx.createLinearGradient(-18*s, -40*s, 18*s, 8*s);
  bodyG.addColorStop(0, '#252525'); bodyG.addColorStop(0.5, '#111111'); bodyG.addColorStop(1, '#050505');
  ctx.fillStyle = bodyG;
  ctx.beginPath(); ctx.ellipse(0, -20*s, 18*s, 26*s, 0, 0, Math.PI*2); ctx.fill();

  // 白色腹部
  const bellyG = ctx.createLinearGradient(0, -35*s, 0, 5*s);
  bellyG.addColorStop(0, '#f5f0e8'); bellyG.addColorStop(0.6, '#e8e0d0'); bellyG.addColorStop(1, '#d0c8b8');
  ctx.fillStyle = bellyG;
  ctx.beginPath(); ctx.ellipse(0, -18*s, 10*s, 18*s, 0, 0, Math.PI*2); ctx.fill();

  // 翅膀（煽动）
  [-1, 1].forEach(side => {
    ctx.save();
    ctx.translate(side * 18*s, -20*s);
    ctx.rotate(side * (Math.PI * 0.15 + wingFlap));
    ctx.fillStyle = '#151515';
    ctx.beginPath(); ctx.ellipse(0, 0, 7*s, 16*s, side * 0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(80,60,30,0.3)';
    ctx.beginPath(); ctx.ellipse(-1*s*side, -3*s, 3*s, 8*s, side * 0.2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // 头部
  ctx.fillStyle = '#151515';
  ctx.beginPath(); ctx.arc(0, -48*s, 18*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ede8df';
  ctx.beginPath(); ctx.ellipse(0, -44*s, 11*s, 13*s, 0, 0, Math.PI*2); ctx.fill();

  // 牛角（恶魔特征）
  [-1, 1].forEach(side => {
    const hornG = ctx.createLinearGradient(side*8*s, -58*s, side*12*s, -74*s);
    hornG.addColorStop(0, '#1a1a1a'); hornG.addColorStop(1, '#333333');
    ctx.fillStyle = hornG;
    ctx.beginPath();
    ctx.moveTo(side * 7*s, -58*s);
    ctx.quadraticCurveTo(side * 14*s, -62*s, side * 11*s, -75*s);
    ctx.quadraticCurveTo(side * 9*s, -68*s, side * 5*s, -60*s);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(80,60,20,0.5)'; ctx.lineWidth = 0.8*s;
    ctx.beginPath(); ctx.moveTo(side*7*s, -59*s); ctx.lineTo(side*11*s, -74*s); ctx.stroke();
  });

  // 恶魔眼睛（橙红发光）
  [[-7, -49], [7, -49]].forEach(([ex, ey]) => {
    ctx.save();
    ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 8*s;
    ctx.fillStyle = '#ff6600';
    ctx.beginPath(); ctx.ellipse(ex*s, ey*s, 4.5*s, 4*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#cc2200';
    ctx.beginPath(); ctx.ellipse(ex*s, ey*s, 2*s, 3.5*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffaa44';
    ctx.beginPath(); ctx.arc(ex*s - 1*s, ey*s - 1.5*s, 1.2*s, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // V形凶眉
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 2*s; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-11*s, -54*s); ctx.lineTo(-6*s, -52*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(11*s, -54*s); ctx.lineTo(6*s, -52*s); ctx.stroke();

  // 橙色喙 + 尖牙
  ctx.fillStyle = '#ff8800';
  ctx.beginPath(); ctx.moveTo(-5*s, -40*s); ctx.lineTo(5*s, -40*s); ctx.lineTo(0, -34*s); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.moveTo(-3*s,-40*s); ctx.lineTo(-2*s,-40*s); ctx.lineTo(-2.5*s,-44*s); ctx.fill();
  ctx.beginPath(); ctx.moveTo(2*s,-40*s); ctx.lineTo(3*s,-40*s); ctx.lineTo(2.5*s,-44*s); ctx.fill();

  // 红色学士帽
  const hatBrim = ctx.createLinearGradient(-22*s,-64*s,22*s,-61*s);
  hatBrim.addColorStop(0,'#8a0000'); hatBrim.addColorStop(0.5,'#cc0000'); hatBrim.addColorStop(1,'#8a0000');
  ctx.fillStyle = hatBrim;
  ctx.beginPath(); ctx.ellipse(0, -64*s, 22*s, 5*s, 0, 0, Math.PI*2); ctx.fill();
  const hatBodyG = ctx.createLinearGradient(-14*s,-83*s,14*s,-64*s);
  hatBodyG.addColorStop(0,'#cc0000'); hatBodyG.addColorStop(0.5,'#aa0000'); hatBodyG.addColorStop(1,'#880000');
  ctx.fillStyle = hatBodyG;
  ctx.beginPath(); ctx.roundRect(-14*s,-83*s,28*s,20*s,2*s); ctx.fill();
  ctx.strokeStyle='rgba(255,200,0,0.6)'; ctx.lineWidth=0.8*s;
  ctx.beginPath(); ctx.roundRect(-14*s,-83*s,28*s,20*s,2*s); ctx.stroke();
  // 流苏
  ctx.strokeStyle='#ffdd00'; ctx.lineWidth=1.5*s;
  ctx.beginPath(); ctx.moveTo(0,-83*s); ctx.lineTo(12*s,-79*s); ctx.stroke();
  ctx.fillStyle='#ffdd00';
  ctx.beginPath(); ctx.arc(12*s,-79*s,3*s,0,Math.PI*2); ctx.fill();

  // 三叉戟（左手持）
  ctx.save();
  ctx.translate(-24*s, -28*s);
  ctx.rotate(-0.25 + Math.sin(t*0.8)*0.08);
  const staffG = ctx.createLinearGradient(-1.5*s,0,1.5*s,40*s);
  staffG.addColorStop(0,'#999999'); staffG.addColorStop(1,'#444444');
  ctx.fillStyle=staffG; ctx.fillRect(-1.5*s,-50*s,3*s,56*s);
  ctx.fillStyle='#bbbbbb';
  [-6,0,6].forEach(fx=>{
    ctx.beginPath(); ctx.moveTo(fx*s-2*s,-50*s); ctx.lineTo(fx*s+2*s,-50*s); ctx.lineTo(fx*s,-63*s); ctx.fill();
  });
  ctx.strokeStyle='rgba(220,220,220,0.5)'; ctx.lineWidth=0.8*s;
  ctx.beginPath(); ctx.moveTo(-0.5*s,-50*s); ctx.lineTo(-0.5*s,5*s); ctx.stroke();
  ctx.restore();

  // 危险特效
  if(danger > 0) {
    ctx.save();
    ctx.globalAlpha = alpha * danger * pulse * 0.4;
    const dg = ctx.createRadialGradient(0,-30*s,0,0,-30*s,55*s);
    dg.addColorStop(0,'rgba(255,50,0,0.6)'); dg.addColorStop(1,'transparent');
    ctx.fillStyle=dg; ctx.beginPath(); ctx.arc(0,-30*s,55*s,0,Math.PI*2); ctx.fill();
    ctx.restore();
    if(danger > 0.75) {
      ctx.globalAlpha = alpha * (danger-0.75)*4 * pulse;
      ctx.fillStyle='#ff2200'; ctx.font=`bold ${9*s|0}px Arial`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='#ff0000'; ctx.shadowBlur=8*s;
      ctx.fillText('危险！', 0, -100*s);
      ctx.shadowBlur=0; ctx.globalAlpha=alpha;
    }
  }

  ctx.restore();
}

// ── DRAW PENGUIN (探险家企鹅) ─────────────────────────────────
function drawPenguin(){
  const p=proj(P.x,P.y,P.z); if(!p) return;
  const px=p.x, py=p.y, s=p.s*.55;

  // ── 滑行残影（3帧半透明叠影）──────────────────────────────
  if(P.slide){
    for(let gi=1;gi<=3;gi++){
      const gz = P.z + gi * Math.max(4, speed * 0.9);
      const gp = proj(P.x, P.y, gz); if(!gp) continue;
      const gs = gp.s * 0.55;
      ctx.save();
      ctx.globalAlpha = (0.28 - gi*0.07);
      ctx.translate(gp.x, gp.y);
      ctx.rotate(-0.5); ctx.scale(1, 0.65);
      // 身体轮廓残影
      const gg=ctx.createRadialGradient(0,-12*gs,2*gs,0,-10*gs,20*gs);
      gg.addColorStop(0,'rgba(80,120,220,0.7)');
      gg.addColorStop(1,'transparent');
      ctx.fillStyle=gg;
      ctx.beginPath(); ctx.ellipse(0,-12*gs,18*gs,22*gs,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  ctx.save(); ctx.translate(px,py);

  // ── 护盾光晕 ──────────────────────────────────────────────
  if(hasShield){
    ctx.save();
    // 外层护符旋转纹样
    ctx.globalAlpha=0.18+Math.sin(frame*.08)*.08;
    for(let ri=0;ri<6;ri++){
      const ra=ri*Math.PI/3+frame*.018;
      const rx=Math.cos(ra)*30*s, ry=Math.sin(ra)*30*s;
      ctx.fillStyle='#ffd700';
      ctx.beginPath(); ctx.arc(rx,ry-12*s,2.5*s,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=.28+Math.sin(frame*.1)*.12;
    const sg=ctx.createRadialGradient(0,-12*s,5*s,0,-12*s,34*s);
    sg.addColorStop(0,'transparent'); sg.addColorStop(.65,'rgba(255,215,0,0.5)'); sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(0,-12*s,34*s,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,215,0,0.7)'; ctx.lineWidth=2*s;
    ctx.setLineDash([5*s,4*s]); ctx.lineDashOffset=frame*.8;
    ctx.globalAlpha=.6+Math.sin(frame*.15)*.28;
    ctx.beginPath(); ctx.arc(0,-12*s,32*s,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  if(hasMag){
    ctx.save(); ctx.globalAlpha=.12+Math.sin(frame*.08)*.04;
    const mg=ctx.createRadialGradient(0,-12*s,5*s,0,-12*s,52*s);
    mg.addColorStop(0,'transparent'); mg.addColorStop(.7,'#ffaa44'); mg.addColorStop(1,'transparent');
    ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(0,-12*s,52*s,0,Math.PI*2); ctx.fill();
    // 磁场弧线
    ctx.globalAlpha=0.22+Math.sin(frame*.06)*.1;
    ctx.strokeStyle='#ff8822'; ctx.lineWidth=s*0.9;
    for(let mi=0;mi<3;mi++){
      const ma=frame*.04+mi*Math.PI*2/3;
      ctx.beginPath(); ctx.arc(0,-12*s,38*s,ma,ma+1.2); ctx.stroke();
    }
    ctx.restore();
  }

  // 地面阴影（动态：跳跃时投影拉伸变淡，落地压缩变实）
  const jumpH = Math.max(0, P.y);
  const shadowSz = Math.max(0.35, 1 - jumpH*0.016);
  const shadowA  = Math.max(0.06, 0.38 - jumpH*0.007);
  ctx.fillStyle=`rgba(0,0,0,${shadowA.toFixed(3)})`;
  ctx.beginPath(); ctx.ellipse(jumpH*0.07*s, 2+jumpH*0.10*s, 20*s*shadowSz, 6*s*P.sq*shadowSz, 0,0,Math.PI*2); ctx.fill();
  // 跳跃时在地面额外投射一个真实落地阴影
  if(jumpH > 6){
    const gsp = proj(P.x, 0, P.z);
    if(gsp){
      ctx.save();
      ctx.translate(gsp.x-px, gsp.y-py);
      ctx.globalAlpha = Math.max(0.04, 0.24-jumpH*0.005);
      ctx.fillStyle = 'rgba(0,0,0,0.88)';
      ctx.beginPath(); ctx.ellipse(0,0, 15*gsp.s*shadowSz, 3.5*gsp.s*shadowSz, 0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  const isl=P.slide;
  // 跳跃拉伸/落地压扁
  const stretchV = P.jump && P.vy > 2 ? P.st : 1;
  const squashH  = P.jump && P.vy > 2 ? 0.88 : 1;
  ctx.save(); ctx.rotate(isl?-.5:0);
  ctx.scale(squashH, P.sq*stretchV*(isl?.65:1));

  // ── 靴子/腿 ──────────────────────────────────────────────
  if(!isl){
    // 高速时腿部运动残影
    if(sm > 1.8){
      const ghostAlpha = Math.min(0.28, (sm-1.8)*0.15);
      ctx.save(); ctx.globalAlpha = ghostAlpha;
      [[-6,1],[6,-1]].forEach(([off,fl])=>{
        const prevRC = P.rc - 0.35;
        const prevLeg = Math.sin(prevRC)*25;
        ctx.save(); ctx.translate(off*s,0);
        ctx.rotate(prevLeg*fl*Math.min(38,25+sm*5)*Math.PI/180/25);
        ctx.fillStyle='#3a5090';
        ctx.beginPath(); ctx.roundRect(-3.5*s,-5*s,7*s,8*s,1.5*s); ctx.fill();
        ctx.restore();
      });
      ctx.restore();
    }
    [[-6,1],[6,-1]].forEach(([off,fl])=>{
      ctx.save(); ctx.translate(off*s,0);
      const legAmp = Math.min(38, 25 + sm * 5); // 步频随速度变化
      ctx.rotate(P.leg*fl*legAmp*Math.PI/180/25);
      // 裤管（深蓝探险裤）
      ctx.fillStyle='#1a2a5a';
      ctx.beginPath(); ctx.roundRect(-3.5*s,-5*s,7*s,8*s,1.5*s); ctx.fill();
      // 裤管缝线
      ctx.strokeStyle='rgba(80,110,200,0.4)'; ctx.lineWidth=0.6*s;
      ctx.beginPath(); ctx.moveTo(0,-5*s); ctx.lineTo(0,3*s); ctx.stroke();
      // 靴筒
      const bootG=ctx.createLinearGradient(-4*s,0,4*s,12*s);
      bootG.addColorStop(0,'#7a4218'); bootG.addColorStop(0.4,'#5a2e10'); bootG.addColorStop(1,'#3a1a08');
      ctx.fillStyle=bootG;
      ctx.beginPath(); ctx.roundRect(-4*s,2*s,8*s,10*s,2*s); ctx.fill();
      // 靴筒高光
      ctx.fillStyle='rgba(200,130,60,0.2)';
      ctx.beginPath(); ctx.roundRect(-3*s,3*s,2.5*s,4*s,1*s); ctx.fill();
      // 靴底
      const soleG=ctx.createLinearGradient(-7*s,11*s,7*s,13*s);
      soleG.addColorStop(0,'#1a0a03'); soleG.addColorStop(0.5,'#2e1508'); soleG.addColorStop(1,'#1a0a03');
      ctx.fillStyle=soleG;
      ctx.beginPath(); ctx.ellipse(-fl*1.5*s,12*s,7.5*s,3.8*s,.25*fl,0,Math.PI*2); ctx.fill();
      // 靴底纹防滑纹
      ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=0.5*s;
      for(let bi=0;bi<3;bi++){
        ctx.beginPath(); ctx.moveTo((-4+bi*2.5)*s,12.5*s); ctx.lineTo((-3+bi*2.5)*s,13.5*s); ctx.stroke();
      }
      // 靴扣（金色腾讯Logo色）
      const buckG=ctx.createRadialGradient(0*s,5*s,0.5*s,0*s,5*s,2.5*s);
      buckG.addColorStop(0,'#ffe050'); buckG.addColorStop(1,'#a06a08');
      ctx.fillStyle=buckG;
      ctx.beginPath(); ctx.arc(0*s,5*s,2*s,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(80,50,5,0.5)'; ctx.lineWidth=0.5*s;
      ctx.beginPath(); ctx.arc(0*s,5*s,2*s,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    });
  } else {
    // 滑行靴（侧躺）
    const sb=ctx.createLinearGradient(-18*s,8*s,18*s,14*s);
    sb.addColorStop(0,'#3a1a08'); sb.addColorStop(0.5,'#6a3a18'); sb.addColorStop(1,'#3a1a08');
    ctx.fillStyle=sb;
    ctx.beginPath(); ctx.ellipse(0,10*s,18*s,4.5*s,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(200,130,60,0.2)';
    ctx.beginPath(); ctx.ellipse(-6*s,9*s,5*s,2*s,0,0,Math.PI*2); ctx.fill();
  }

  // ── 腰包（探险家装备）─────────────────────────────────────
  if(!isl){
    const bpG=ctx.createLinearGradient(-8*s,-5*s,8*s,2*s);
    bpG.addColorStop(0,'#5a3010'); bpG.addColorStop(0.5,'#7a4820'); bpG.addColorStop(1,'#3a2008');
    ctx.fillStyle=bpG;
    ctx.beginPath(); ctx.roundRect(9*s,-8*s,11*s,9*s,2*s); ctx.fill();
    // 腰包金扣
    ctx.fillStyle='#c8960a'; ctx.fillRect(12*s,-5*s,5*s,1.5*s);
    // 腰包口袋
    ctx.fillStyle='rgba(40,20,8,0.5)'; ctx.beginPath(); ctx.roundRect(10.5*s,-6.5*s,4*s,4*s,1*s); ctx.fill();
    // 腰包带
    ctx.strokeStyle='#4a2808'; ctx.lineWidth=2.5*s;
    ctx.beginPath(); ctx.moveTo(9*s,-4*s); ctx.lineTo(-18*s,-4*s); ctx.stroke();
    ctx.strokeStyle='#6a3818'; ctx.lineWidth=1.5*s;
    ctx.beginPath(); ctx.moveTo(9*s,-4*s); ctx.lineTo(-18*s,-4*s); ctx.stroke();
  }

  // ── 企鹅身体（腾讯吉祥物：黑色外套+白肚皮边可见）────────
  // 白肚皮（侧边可见弧线）
  ctx.fillStyle='rgba(240,240,240,0.18)';
  ctx.beginPath(); ctx.ellipse(0,-10*s,10*s,16*s,0,0,Math.PI*2); ctx.fill();

  // 主体（深黑羽毛）
  const bg=ctx.createRadialGradient(-6*s,-18*s,3,2*s,-8*s,26*s);
  bg.addColorStop(0,'#383838'); bg.addColorStop(0.4,'#1c1c1c'); bg.addColorStop(0.8,'#0e0e0e'); bg.addColorStop(1,'#060606');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(0,-12*s,18*s,22*s,0,0,Math.PI*2); ctx.fill();

  // 背部羽毛纹理（细化分层）
  const backG=ctx.createRadialGradient(3*s,-18*s,2,0,-10*s,18*s);
  backG.addColorStop(0,'#323232'); backG.addColorStop(0.5,'#1a1a1a'); backG.addColorStop(1,'#080808');
  ctx.fillStyle=backG; ctx.beginPath(); ctx.ellipse(0,-10*s,11*s,15*s,0,0,Math.PI*2); ctx.fill();

  // 羽毛细纹（蓬松感）
  ctx.strokeStyle='rgba(70,70,70,0.55)'; ctx.lineWidth=0.7*s;
  [-6,-2,2,6].forEach((dx,i)=>{
    ctx.beginPath(); ctx.moveTo(dx*s,-3*s); ctx.quadraticCurveTo((dx+2.5)*s,-11*s,(dx+0.5)*s,-19*s); ctx.stroke();
  });
  // 羽毛高光（蓝紫虹彩）
  ctx.save(); ctx.globalAlpha=0.12+Math.sin(frame*.04+1)*0.05;
  const iridG=ctx.createLinearGradient(-10*s,-22*s,10*s,-5*s);
  iridG.addColorStop(0,'rgba(80,80,200,0.8)'); iridG.addColorStop(0.5,'rgba(120,60,180,0.4)'); iridG.addColorStop(1,'transparent');
  ctx.fillStyle=iridG; ctx.beginPath(); ctx.ellipse(0,-13*s,10*s,13*s,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── 翅膀（带探险家背包带，扇动幅度随速度增强）──────────────────
  [[-16,-1],[16,1]].forEach(([tx,fl])=>{
    ctx.save(); ctx.translate(tx*s,-12*s);
    const wingAmp = 1 + Math.min(1, (sm-1)*0.5); // 速度越快扇动越猛
    ctx.rotate((-20*fl+P.wing*fl*wingAmp*1.8)*Math.PI/180);
    const wg=ctx.createLinearGradient(-5*s,-4*s,5*s,18*s);
    wg.addColorStop(0,'#2e2e2e'); wg.addColorStop(0.5,'#1a1a1a'); wg.addColorStop(1,'#080808');
    ctx.fillStyle=wg; ctx.beginPath(); ctx.ellipse(fl*3*s,8*s,6.5*s,15*s,.18*fl,0,Math.PI*2); ctx.fill();
    // 翅膀前缘高光
    ctx.fillStyle='rgba(60,60,60,0.4)';
    ctx.beginPath(); ctx.ellipse(fl*1*s,5*s,2.5*s,7*s,.18*fl,0,Math.PI*2); ctx.fill();
    // 袖口（卡其色探险家外套）
    const cuffG=ctx.createLinearGradient(fl*-1*s,14*s,fl*5*s,18*s);
    cuffG.addColorStop(0,'#b89040'); cuffG.addColorStop(0.5,'#9a7a30'); cuffG.addColorStop(1,'#6a5018');
    ctx.fillStyle=cuffG;
    ctx.beginPath(); ctx.ellipse(fl*3*s,17*s,6*s,3.2*s,0,0,Math.PI*2); ctx.fill();
    // 袖口金线
    ctx.strokeStyle='rgba(200,160,40,0.6)'; ctx.lineWidth=0.8*s;
    ctx.beginPath(); ctx.ellipse(fl*3*s,16*s,5.5*s,2.5*s,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  });

  // ── 背包（神庙探险风格）──────────────────────────────────
  if(!isl){
    const pkG=ctx.createLinearGradient(-8*s,-32*s,8*s,-8*s);
    pkG.addColorStop(0,'#5a3c18'); pkG.addColorStop(0.3,'#7a5428'); pkG.addColorStop(0.7,'#6a4420'); pkG.addColorStop(1,'#3a2008');
    ctx.fillStyle=pkG;
    ctx.beginPath(); ctx.roundRect(-7*s,-32*s,14*s,20*s,3*s); ctx.fill();
    // 背包边框
    ctx.strokeStyle='rgba(180,130,50,0.5)'; ctx.lineWidth=0.8*s;
    ctx.beginPath(); ctx.roundRect(-7*s,-32*s,14*s,20*s,3*s); ctx.stroke();
    // 背包口袋扣
    const buckG2=ctx.createLinearGradient(-3*s,-20*s,3*s,-16*s);
    buckG2.addColorStop(0,'#ffd050'); buckG2.addColorStop(1,'#a07010');
    ctx.fillStyle=buckG2; ctx.beginPath(); ctx.roundRect(-3*s,-20*s,6*s,4*s,1*s); ctx.fill();
    // 背包安卡符号刺绣
    ctx.save(); ctx.globalAlpha=0.38;
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=0.8*s;
    ctx.beginPath(); ctx.arc(0,-26*s,2.5*s,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-23.5*s); ctx.lineTo(0,-18*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-3*s,-22*s); ctx.lineTo(3*s,-22*s); ctx.stroke();
    ctx.restore();
  }

  // ── 头部（精细化：腾讯企鹅后脑勺+帽子）─────────────────────
  const hy=-30*s;
  // 头部底色（略带蓝光，腾讯企鹅）
  const hg=ctx.createRadialGradient(-4*s,hy-6*s,2,1*s,hy,14*s);
  hg.addColorStop(0,'#303038'); hg.addColorStop(0.6,'#1a1a22'); hg.addColorStop(1,'#0a0a10');
  ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(0,hy,14*s,0,Math.PI*2); ctx.fill();
  // 头部高光（圆形光泽）
  ctx.fillStyle='rgba(80,80,120,0.15)';
  ctx.beginPath(); ctx.arc(-4*s,hy-6*s,5*s,0,Math.PI*2); ctx.fill();
  // 耳朵（小圆耳）
  [-1,1].forEach(fl=>{
    ctx.fillStyle='#1a1a22';
    ctx.beginPath(); ctx.arc(fl*13*s,hy-4*s,3.5*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(30,30,50,0.5)';
    ctx.beginPath(); ctx.arc(fl*12.5*s,hy-4.5*s,2*s,0,Math.PI*2); ctx.fill();
  });

  // ── 探险家帽子（精细化）──────────────────────────────────
  // 帽檐阴影（前面投影）
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(2*s,hy-12*s,22*s,7*s,0.08,0,Math.PI*2); ctx.fill();
  // 帽檐主体
  const brimG=ctx.createLinearGradient(-22*s,hy-18*s,22*s,hy-10*s);
  brimG.addColorStop(0,'#4a2808'); brimG.addColorStop(0.3,'#7a5020'); brimG.addColorStop(0.5,'#6a4018'); brimG.addColorStop(0.8,'#5a3010'); brimG.addColorStop(1,'#3a1808');
  ctx.fillStyle=brimG;
  ctx.beginPath(); ctx.ellipse(0,hy-13*s,21*s,5.5*s,0,0,Math.PI*2); ctx.fill();
  // 帽檐皮革纹理
  ctx.strokeStyle='rgba(30,15,5,0.3)'; ctx.lineWidth=0.6*s;
  for(let ci=0;ci<5;ci++){
    ctx.beginPath(); ctx.ellipse(0,hy-13*s,(21-ci*3)*s,(5.5-ci*.5)*s,0,0.1,0.9*Math.PI); ctx.stroke();
  }
  // 帽身渐变
  const hatG=ctx.createLinearGradient(-14*s,hy-32*s,14*s,hy-12*s);
  hatG.addColorStop(0,'#9a5c2a'); hatG.addColorStop(0.25,'#7a4018'); hatG.addColorStop(0.6,'#5e3010'); hatG.addColorStop(1,'#3a1a08');
  ctx.fillStyle=hatG;
  ctx.beginPath(); ctx.roundRect(-13*s,hy-31*s,26*s,18*s,3*s); ctx.fill();
  // 帽身侧面阴影
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.roundRect(7*s,hy-30*s,6*s,17*s,2*s); ctx.fill();
  // 帽身皮纹横缝
  ctx.strokeStyle='rgba(30,15,5,0.25)'; ctx.lineWidth=0.7*s;
  for(let hi=0;hi<4;hi++){
    ctx.beginPath(); ctx.moveTo(-12*s,hy-28*s+hi*5*s); ctx.lineTo(12*s,hy-28*s+hi*5*s); ctx.stroke();
  }
  // 帽带（黑色皮革）
  const hatbG=ctx.createLinearGradient(-13*s,hy-17*s,13*s,hy-14*s);
  hatbG.addColorStop(0,'#0e0805'); hatbG.addColorStop(0.5,'#1e1008'); hatbG.addColorStop(1,'#0e0805');
  ctx.fillStyle=hatbG;
  ctx.fillRect(-13*s,hy-17.5*s,26*s,4*s);
  // 帽带缝线
  ctx.strokeStyle='rgba(150,100,30,0.4)'; ctx.lineWidth=0.5*s;
  ctx.setLineDash([2*s,2*s]);
  ctx.beginPath(); ctx.moveTo(-12*s,hy-16*s); ctx.lineTo(12*s,hy-16*s); ctx.stroke();
  ctx.setLineDash([]);
  // 帽带扣（金色精细）
  const bckG=ctx.createLinearGradient(-4*s,hy-19*s,4*s,hy-14*s);
  bckG.addColorStop(0,'#ffe050'); bckG.addColorStop(0.5,'#c89020'); bckG.addColorStop(1,'#806010');
  ctx.fillStyle=bckG;
  ctx.beginPath(); ctx.roundRect(-4.5*s,hy-19.5*s,9*s,6*s,1.5*s); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(-2.5*s,hy-18*s,5*s,3*s,0.8*s); ctx.fill();
  // 帽顶金属钉
  ctx.fillStyle='#c8a020'; ctx.beginPath(); ctx.arc(0,hy-31*s,2.5*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,220,80,0.6)'; ctx.beginPath(); ctx.arc(-0.8*s,hy-32*s,1*s,0,Math.PI*2); ctx.fill();

  // 速度特效（下落时产生飘动气流线）
  if(P.jump && P.vy < -1 && !isl){
    const fallSpeed = Math.min(1, Math.abs(P.vy)/8);
    ctx.save();
    ctx.strokeStyle = `rgba(220,180,100,0.6)`;
    ctx.lineWidth = 1.2;
    [-18,-7,5,16].forEach((off,i)=>{
      const len = (18+i*8)*s*fallSpeed;
      ctx.globalAlpha = 0.2*fallSpeed*(1-i*.22);
      ctx.beginPath();
      ctx.moveTo(off*s, (-28+i*8)*s);
      ctx.lineTo(off*s - len, (-28+i*8)*s);
      ctx.stroke();
    });
    ctx.restore();
  }

  // ── 速度特效 ─────────────────────────────────────────────
  if(scoreMult>1){
    for(let i=0;i<6;i++){
      ctx.save();
      ctx.globalAlpha=(.42-i*.07)*(0.55+Math.sin(frame*.1+i)*.35);
      ctx.fillStyle=`hsl(${20+i*10},100%,${58-i*4}%)`;
      const ts=1-i*.16;
      ctx.beginPath(); ctx.ellipse(-i*3.5*s,-12*s,18*s*ts,22*s*ts,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  if(sm>1.5&&!isl){
    const flowA=Math.min(.5,(sm-1.5)*.3);
    ctx.strokeStyle=`rgba(220,150,40,${flowA})`;
    ctx.lineWidth=1.8;
    [-16,-6,4].forEach((off,i)=>{
      const len=(22+i*9)*s*(0.7+Math.sin(frame*.08+i)*.3);
      ctx.globalAlpha=flowA*(1-i*.25);
      ctx.beginPath(); ctx.moveTo(-26*s,(-32+off)*s); ctx.lineTo(-26*s-len,(-32+off)*s); ctx.stroke();
    });
    ctx.globalAlpha=1;
  }
  ctx.restore(); ctx.restore();
}

// ── DRAW HUD (神庙风格UI) ─────────────────────────────────────
function drawHUD(){
  if(state!==ST.PLAY) return;
  const pad=15;

  // 距离面板（石刻风格 + 呼吸光效）
  ctx.save();
  const hudBreath = 0.3 + Math.sin(frame*0.045)*0.12;
  ctx.fillStyle='rgba(20,10,3,.7)';
  ctx.strokeStyle=`rgba(180,130,50,${0.28+hudBreath*0.25})`; ctx.lineWidth=1.5;
  ctx.shadowColor='rgba(200,120,20,0.35)'; ctx.shadowBlur=8*hudBreath;
  ctx.beginPath(); ctx.roundRect(pad,pad,115,66,6); ctx.fill(); ctx.stroke();
  ctx.shadowBlur=0;
  // 内边框（石刻装饰）
  ctx.strokeStyle='rgba(100,70,20,.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(pad+3,pad+3,109,60,4); ctx.stroke();
  ctx.font='10px Arial'; ctx.fillStyle='rgba(200,160,60,.8)'; ctx.textAlign='left';
  ctx.fillText('距离',pad+10,pad+19);
  ctx.font='bold 22px Arial';
  const dg=ctx.createLinearGradient(0,pad+25,0,pad+50);
  dg.addColorStop(0,'#ffe0a0'); dg.addColorStop(1,'#c8960a');
  ctx.fillStyle=dg; ctx.fillText(dist.toFixed(0)+'m',pad+10,pad+50);
  ctx.restore();

  // 金币面板
  ctx.save();
  ctx.fillStyle='rgba(20,10,3,.7)'; ctx.strokeStyle='rgba(180,130,50,.35)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(BW-135-pad,pad,135,66,6); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='rgba(100,70,20,.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(BW-135-pad+3,pad+3,129,60,4); ctx.stroke();
  ctx.font='10px Arial'; ctx.fillStyle='rgba(200,160,60,.8)'; ctx.textAlign='right';
  ctx.fillText('宝物',BW-pad-10,pad+19);
  ctx.font='bold 22px Arial';
  const cg=ctx.createLinearGradient(0,pad+25,0,pad+50);
  cg.addColorStop(0,'#ffe0a0'); cg.addColorStop(1,'#c8960a');
  ctx.fillStyle=cg;
  // 金币数字弹跳缩放
  if(scorePopScale > 1.01){
    ctx.save();
    ctx.translate(BW-pad-10, pad+50);
    ctx.scale(scorePopScale, scorePopScale);
    ctx.translate(-(BW-pad-10), -(pad+50));
    ctx.fillText('💰 '+coins,BW-pad-10,pad+50);
    ctx.restore();
  } else {
    ctx.fillText('💰 '+coins,BW-pad-10,pad+50);
  }
  ctx.restore();

  // 速度
  ctx.save(); ctx.textAlign='center';
  ctx.font='11px Arial';
  ctx.fillStyle=sm>2?'rgba(255,140,40,.95)':'rgba(200,160,60,.85)';
  ctx.fillText(sm.toFixed(1)+'x',BW/2,pad+20);
  if(scoreMult>1){
    ctx.shadowColor='#cc4400'; ctx.shadowBlur=10;
    ctx.font='bold 15px Arial'; ctx.fillStyle='#ff7722';
    ctx.fillText('x'+scoreMult+' 得分!',BW/2,pad+42);
  }
  ctx.restore();

  // 道具计时条（神庙风格）
  if(puType&&puTimer>0){
    const clr={mag:'#ffaa44',sh:'#ffd700',bo:'#ff6600'};
    const lbl={mag:'🧲 磁铁',sh:'🛡️ 护盾',bo:'⚡ 加速'};
    const bw=160, bx=BW/2-bw/2, by=BH-48;
    ctx.save();
    ctx.fillStyle='rgba(15,8,2,.72)';
    ctx.beginPath(); ctx.roundRect(bx-6,by-22,bw+12,34,6); ctx.fill();
    ctx.strokeStyle='rgba(160,110,30,.4)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(bx-6,by-22,bw+12,34,6); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.1)';
    ctx.beginPath(); ctx.roundRect(bx,by-3,bw,9,4); ctx.fill();
    const c=clr[puType];
    ctx.fillStyle=c; ctx.shadowColor=c; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.roundRect(bx,by-3,bw*(puTimer/PU_DUR),9,4); ctx.fill();
    ctx.shadowBlur=0; ctx.font='12px Arial'; ctx.fillStyle='#ffe0a0';
    ctx.textAlign='center'; ctx.fillText(lbl[puType],BW/2,by-8);
    ctx.restore();
  }

  // 连击
  if(combo>=3){
    ctx.save();
    ctx.globalAlpha=Math.min(1,comboTimer/30);
    ctx.shadowColor='#ff8800'; ctx.shadowBlur=14;
    ctx.font=`bold ${16+Math.min(combo,8)}px Arial`;
    ctx.fillStyle='#ffaa40'; ctx.textAlign='center';
    ctx.fillText(combo+' COMBO!',BW/2,BH-78);
    ctx.restore();
  }

  // 道路指示点（改成暖金色）
  const cy=BH-66, cx=BW/2, lw=20, gap=7;
  LANES.forEach(l=>{
    const x=cx+l*(lw+gap)-lw/2;
    const active=l===P.lane||l===P.tLane;
    ctx.fillStyle=active?'rgba(200,150,40,.8)':'rgba(60,40,12,.4)';
    ctx.strokeStyle=active?'rgba(240,190,60,.95)':'rgba(90,60,18,.4)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(x,cy,lw,8,3); ctx.fill(); ctx.stroke();
  });

  // ── 法老追捕进度条 ──────────────────────────────────────────
  if(gameTime > PHARAOH_START_DELAY - 1) {
    const barW = BW * 0.55, barH = 10, barX = BW/2 - barW/2, barY = BH - 22;
    const ratio = Math.max(0, Math.min(1, 1 - pharaoh.dist / 420));
    const danger = pharaoh.dist < 120;

    // 背景槽（石刻风格）
    ctx.save();
    ctx.fillStyle = 'rgba(10,5,2,0.75)';
    ctx.strokeStyle = 'rgba(160,110,30,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(barX-2, barY-2, barW+4, barH+4, 4); ctx.fill(); ctx.stroke();

    // 进度（绿→黄→红渐变）
    const barFill = ctx.createLinearGradient(barX, barY, barX+barW*ratio, barY);
    if(ratio < 0.5) {
      barFill.addColorStop(0,'#2a9a20'); barFill.addColorStop(1,'#70cc30');
    } else if(ratio < 0.8) {
      barFill.addColorStop(0,'#cc8800'); barFill.addColorStop(1,'#ffcc00');
    } else {
      const flash = danger ? (0.6+Math.sin(pharaoh.warningFlash)*0.4) : 1;
      barFill.addColorStop(0,'#cc1000'); barFill.addColorStop(1,`rgba(255,50,0,${flash})`);
    }
    ctx.fillStyle = barFill;
    ctx.beginPath(); ctx.roundRect(barX, barY, barW*ratio, barH, 3); ctx.fill();

    // 法老图标（左侧）
    ctx.font = '13px Arial'; ctx.textAlign = 'right';
    ctx.fillStyle = danger
      ? `rgba(255,80,0,${0.7+Math.sin(pharaoh.warningFlash)*0.3})`
      : 'rgba(200,160,50,0.85)';
    ctx.fillText('𓂀', barX - 5, barY + 9);

    // 危险时显示警告文字
    if(danger && pharaoh.dist < 80) {
      ctx.globalAlpha = 0.6 + Math.sin(pharaoh.warningFlash)*0.4;
      ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
      ctx.fillStyle = '#ff5500';
      ctx.fillText('⚠ 法老将至！', BW/2, barY - 4);
    }
    ctx.restore();
  }
}

// ── MENU ──────────────────────────────────────────────────────
function drawMenu(){
  menuPulse += .022;
  const t = menuPulse;

  // ── 静态粒子系统初始化（只创建一次）──────────────────────────
  if(!drawMenu._particles){
    drawMenu._particles = [];
    for(let i=0;i<60;i++){
      drawMenu._particles.push({
        x: Math.random()*480,
        y: Math.random()*720,
        vx:(Math.random()-0.5)*0.4,
        vy:-Math.random()*0.6-0.2,
        size: Math.random()*2.5+0.5,
        life: Math.random()*Math.PI*2,
        speed: Math.random()*0.03+0.015,
        type: Math.floor(Math.random()*3) // 0=gold, 1=spark, 2=ember
      });
    }
  }
  const particles = drawMenu._particles;

  // ── 1. 深邃天空背景（多层）──────────────────────────────────
  const sky = ctx.createLinearGradient(0,0,0,BH);
  sky.addColorStop(0,'#000000');
  sky.addColorStop(0.15,'#050200');
  sky.addColorStop(0.35,'#0e0400');
  sky.addColorStop(0.55,'#200800');
  sky.addColorStop(0.75,'#3a1000');
  sky.addColorStop(1,'#100400');
  ctx.fillStyle=sky; ctx.fillRect(0,0,BW,BH);

  // 远景星光
  ctx.save();
  for(let s=0;s<80;s++){
    const sx = ((s*137.5)%BW);
    const sy = ((s*97.3)%260);
    const sbri = 0.2+Math.sin(t*1.2+s*0.7)*0.15;
    ctx.globalAlpha=sbri;
    ctx.fillStyle='#ffe8a0';
    ctx.beginPath();
    ctx.arc(sx,sy,0.7+Math.sin(t+s)*0.3,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();

  // ── 2. 神庙走廊透视──────────────────────────────────────────
  const vp = {x:BW/2, y:255};
  const floorY = BH + 60;
  const corridorLeft  = 60;
  const corridorRight = BW - 60;

  // 天花板区域
  const ceilG = ctx.createLinearGradient(0,0,0,vp.y);
  ceilG.addColorStop(0,'rgba(0,0,0,1)');
  ceilG.addColorStop(0.6,'rgba(8,4,0,0.95)');
  ceilG.addColorStop(1,'rgba(20,10,0,0.7)');
  ctx.fillStyle=ceilG;
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(BW,0);
  ctx.lineTo(vp.x+35,vp.y); ctx.lineTo(vp.x-35,vp.y);
  ctx.closePath(); ctx.fill();

  // 地板透视格——深色棋盘纹理
  const floorRows=14, floorCols=10;
  for(let row=0;row<floorRows;row++){
    const t0=row/floorRows, t1=(row+1)/floorRows;
    const y0=vp.y+(floorY-vp.y)*t0;
    const y1=vp.y+(floorY-vp.y)*t1;
    const w0=t0*(corridorRight-corridorLeft);
    const w1=t1*(corridorRight-corridorLeft);
    const cx0l=vp.x-w0/2, cx0r=vp.x+w0/2;
    const cx1l=vp.x-w1/2, cx1r=vp.x+w1/2;
    for(let col=0;col<floorCols;col++){
      const x0L=cx0l+w0*col/floorCols;
      const x0R=cx0l+w0*(col+1)/floorCols;
      const x1L=cx1l+w1*col/floorCols;
      const x1R=cx1l+w1*(col+1)/floorCols;
      const isDark=(row+col)%2===0;
      const depthFade=0.3+t0*0.5;
      if(isDark){
        ctx.fillStyle=`rgba(25,12,2,${depthFade})`;
      } else {
        ctx.fillStyle=`rgba(55,30,5,${depthFade*0.7})`;
      }
      ctx.beginPath();
      ctx.moveTo(x0L,y0); ctx.lineTo(x0R,y0);
      ctx.lineTo(x1R,y1); ctx.lineTo(x1L,y1);
      ctx.closePath(); ctx.fill();
      // 砖缝高光
      if(!isDark && t0>0.15){
        ctx.strokeStyle=`rgba(120,70,10,${t0*0.2})`;
        ctx.lineWidth=0.5;
        ctx.beginPath();
        ctx.moveTo(x0L,y0); ctx.lineTo(x0R,y0);
        ctx.lineTo(x1R,y1); ctx.lineTo(x1L,y1);
        ctx.closePath(); ctx.stroke();
      }
    }
  }

  // 地板透视线
  ctx.strokeStyle='rgba(160,100,20,0.22)'; ctx.lineWidth=1;
  for(let i=0;i<=floorCols;i++){
    const fx=corridorLeft+i*(corridorRight-corridorLeft)/floorCols;
    ctx.beginPath(); ctx.moveTo(fx,floorY); ctx.lineTo(vp.x,vp.y); ctx.stroke();
  }
  for(let i=0;i<=floorRows;i++){
    const fy=vp.y+(floorY-vp.y)*i/floorRows;
    const fw=(fy-vp.y)/(floorY-vp.y)*(corridorRight-corridorLeft);
    ctx.beginPath();
    ctx.moveTo(vp.x-fw/2,fy); ctx.lineTo(vp.x+fw/2,fy);
    ctx.stroke();
  }

  // 地板中心光晕
  const floorGlow = ctx.createRadialGradient(vp.x,vp.y+40,0,vp.x,vp.y+40,200);
  floorGlow.addColorStop(0,'rgba(200,120,10,0.12)');
  floorGlow.addColorStop(0.5,'rgba(140,70,5,0.05)');
  floorGlow.addColorStop(1,'transparent');
  ctx.fillStyle=floorGlow;
  ctx.fillRect(0,vp.y,BW,BH-vp.y);

  // ── 左侧石墙──────────────────────────────────────────────────
  const wallW=80;
  // 左墙渐变
  const lWallG = ctx.createLinearGradient(0,0,wallW,0);
  lWallG.addColorStop(0,'rgba(5,2,0,1)');
  lWallG.addColorStop(0.6,'rgba(30,15,2,0.9)');
  lWallG.addColorStop(1,'rgba(55,28,4,0.55)');
  ctx.fillStyle=lWallG;
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(wallW,0);
  ctx.lineTo(vp.x-35,vp.y); ctx.lineTo(vp.x-35,BH);
  ctx.lineTo(0,BH); ctx.closePath(); ctx.fill();

  // 左墙石块纹理
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(wallW,0);
  ctx.lineTo(vp.x-35,vp.y); ctx.lineTo(vp.x-35,BH);
  ctx.lineTo(0,BH); ctx.closePath(); ctx.clip();
  ctx.strokeStyle='rgba(90,50,8,0.22)'; ctx.lineWidth=1;
  for(let row=0;row<22;row++){
    const wy=row*34;
    ctx.beginPath(); ctx.moveTo(0,wy); ctx.lineTo(wallW+20,wy); ctx.stroke();
    const stagger=(row%2)*20;
    for(let bx=stagger-20;bx<wallW+20;bx+=42){
      ctx.beginPath(); ctx.moveTo(bx,wy); ctx.lineTo(bx,wy+34); ctx.stroke();
    }
  }
  ctx.restore();

  // 左墙边缘高光线
  ctx.strokeStyle='rgba(180,110,20,0.3)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(vp.x-35,vp.y); ctx.lineTo(wallW,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(vp.x-35,vp.y); ctx.lineTo(vp.x-35,BH); ctx.stroke();

  // ── 右侧石墙──────────────────────────────────────────────────
  const rWallG = ctx.createLinearGradient(BW,0,BW-wallW,0);
  rWallG.addColorStop(0,'rgba(5,2,0,1)');
  rWallG.addColorStop(0.6,'rgba(30,15,2,0.9)');
  rWallG.addColorStop(1,'rgba(55,28,4,0.55)');
  ctx.fillStyle=rWallG;
  ctx.beginPath();
  ctx.moveTo(BW,0); ctx.lineTo(BW-wallW,0);
  ctx.lineTo(vp.x+35,vp.y); ctx.lineTo(vp.x+35,BH);
  ctx.lineTo(BW,BH); ctx.closePath(); ctx.fill();

  // 右墙石块纹理
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(BW,0); ctx.lineTo(BW-wallW,0);
  ctx.lineTo(vp.x+35,vp.y); ctx.lineTo(vp.x+35,BH);
  ctx.lineTo(BW,BH); ctx.closePath(); ctx.clip();
  ctx.strokeStyle='rgba(90,50,8,0.22)'; ctx.lineWidth=1;
  for(let row=0;row<22;row++){
    const wy=row*34;
    ctx.beginPath(); ctx.moveTo(BW,wy); ctx.lineTo(BW-wallW-20,wy); ctx.stroke();
    const stagger=(row%2)*20;
    for(let bx=stagger-20;bx<wallW+20;bx+=42){
      ctx.beginPath(); ctx.moveTo(BW-bx,wy); ctx.lineTo(BW-bx,wy+34); ctx.stroke();
    }
  }
  ctx.restore();

  ctx.strokeStyle='rgba(180,110,20,0.3)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(vp.x+35,vp.y); ctx.lineTo(BW-wallW,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(vp.x+35,vp.y); ctx.lineTo(vp.x+35,BH); ctx.stroke();

  // ── 走廊顶部拱门──────────────────────────────────────────────
  ctx.save();
  const archG = ctx.createLinearGradient(0,0,0,vp.y+30);
  archG.addColorStop(0,'rgba(0,0,0,0)');
  archG.addColorStop(0.8,'rgba(0,0,0,0)');
  archG.addColorStop(1,'rgba(180,100,10,0.08)');
  ctx.fillStyle=archG; ctx.fillRect(0,0,BW,vp.y+30);
  ctx.restore();

  // 消失点光环
  const vpGlow = ctx.createRadialGradient(vp.x,vp.y,0,vp.x,vp.y,120);
  vpGlow.addColorStop(0,'rgba(255,180,30,0.15)');
  vpGlow.addColorStop(0.3,'rgba(200,120,10,0.08)');
  vpGlow.addColorStop(0.7,'rgba(150,70,5,0.03)');
  vpGlow.addColorStop(1,'transparent');
  ctx.fillStyle=vpGlow;
  ctx.beginPath(); ctx.arc(vp.x,vp.y,120,0,Math.PI*2); ctx.fill();

  // ── 神圣光柱（从消失点射下）────────────────────────────────
  ctx.save();
  const pillarPulse = 0.5+Math.sin(t*0.8)*0.3;
  const pillarG = ctx.createLinearGradient(vp.x,vp.y,vp.x,BH);
  pillarG.addColorStop(0,`rgba(255,200,60,${pillarPulse*0.18})`);
  pillarG.addColorStop(0.3,`rgba(255,160,30,${pillarPulse*0.08})`);
  pillarG.addColorStop(0.7,`rgba(200,100,10,${pillarPulse*0.04})`);
  pillarG.addColorStop(1,'transparent');
  ctx.fillStyle=pillarG;
  const pw = 60+Math.sin(t*1.2)*8;
  ctx.beginPath();
  ctx.moveTo(vp.x-pw/2,vp.y);
  ctx.lineTo(vp.x-pw*2,BH);
  ctx.lineTo(vp.x+pw*2,BH);
  ctx.lineTo(vp.x+pw/2,vp.y);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // ── 3. 精细火把──────────────────────────────────────────────
  function drawTorch(tx,ty,scale){
    ctx.save(); ctx.translate(tx,ty); ctx.scale(scale,scale);

    // 火把光晕
    const glR=55+Math.sin(t*3+tx)*8;
    const glow=ctx.createRadialGradient(0,-15,0,0,-15,glR);
    glow.addColorStop(0,`rgba(255,140,20,${0.18+Math.sin(t*3+tx)*0.06})`);
    glow.addColorStop(0.4,'rgba(200,80,5,0.06)');
    glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,-15,glR,0,Math.PI*2); ctx.fill();

    // 支架
    const bracketG=ctx.createLinearGradient(-5,0,5,0);
    bracketG.addColorStop(0,'#4a2808'); bracketG.addColorStop(0.5,'#8a5018'); bracketG.addColorStop(1,'#4a2808');
    ctx.fillStyle=bracketG;
    ctx.beginPath(); ctx.roundRect(-4,0,8,32,[2,2,4,4]); ctx.fill();

    // 碗形
    const bowlG=ctx.createRadialGradient(0,-3,0,0,-3,12);
    bowlG.addColorStop(0,'#c07828'); bowlG.addColorStop(1,'#6a3a10');
    ctx.fillStyle=bowlG;
    ctx.beginPath(); ctx.ellipse(0,-1,11,5,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(200,140,40,0.5)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.ellipse(0,-1,11,5,0,0,Math.PI*2); ctx.stroke();

    // 火焰层（由外到内）
    const layers=[
      {h:34,w:11,c:'rgba(200,40,0,0.6)',offset:0},
      {h:28,w:9, c:'rgba(255,80,0,0.75)',offset:0.5},
      {h:22,w:7, c:'rgba(255,160,20,0.85)',offset:1.0},
      {h:14,w:4, c:'rgba(255,230,100,0.95)',offset:1.5},
      {h:8, w:2, c:'rgba(255,255,220,1)',offset:2.0},
    ];
    layers.forEach(({h,w,c,offset})=>{
      const flick=Math.sin(t*9+offset+tx*0.1)*3.5;
      const flick2=Math.sin(t*6-offset+tx*0.07)*2;
      ctx.fillStyle=c;
      ctx.beginPath();
      ctx.moveTo(-w,-2);
      ctx.bezierCurveTo(-w*1.5+flick,-h*0.35, flick2-w*0.5,-h*0.7, flick,-h);
      ctx.bezierCurveTo(flick2+w*0.5,-h*0.7, w*1.5+flick,-h*0.35, w,-2);
      ctx.closePath(); ctx.fill();
    });
    ctx.restore();
  }

  // 远处小火把
  drawTorch(vp.x-55,vp.y+30,0.5);
  drawTorch(vp.x+55,vp.y+30,0.5);
  // 中距火把
  drawTorch(90,430,0.85);
  drawTorch(BW-90,430,0.85);
  // 近处大火把
  drawTorch(55,590,1.15);
  drawTorch(BW-55,590,1.15);

  // ── 4. 金色粒子系统──────────────────────────────────────────
  ctx.save();
  particles.forEach(p=>{
    p.life += p.speed;
    p.x += p.vx + Math.sin(p.life*2)*0.3;
    p.y += p.vy;
    if(p.y<-10){ p.y=BH+5; p.x=Math.random()*BW; }
    if(p.x<0) p.x=BW; if(p.x>BW) p.x=0;
    const alpha = (0.4+Math.sin(p.life)*0.4)*Math.min(1,(BH-p.y)/200);
    if(p.type===0){
      // 金色粒子
      ctx.fillStyle=`rgba(255,200,50,${alpha})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    } else if(p.type===1){
      // 火花——十字形
      ctx.strokeStyle=`rgba(255,140,20,${alpha})`;
      ctx.lineWidth=p.size*0.7;
      ctx.beginPath(); ctx.moveTo(p.x-p.size,p.y); ctx.lineTo(p.x+p.size,p.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p.x,p.y-p.size); ctx.lineTo(p.x,p.y+p.size); ctx.stroke();
    } else {
      // 余烬——小菱形
      ctx.fillStyle=`rgba(255,100,10,${alpha*0.7})`;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.life);
      ctx.beginPath(); ctx.moveTo(0,-p.size); ctx.lineTo(p.size*0.6,0);
      ctx.lineTo(0,p.size); ctx.lineTo(-p.size*0.6,0); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  });
  ctx.restore();

  // ── 5. 精细企鹅（在走廊中奔跑）────────────────────────────
  function drawPenguin(px,py,scale,runPhase){
    ctx.save(); ctx.translate(px,py); ctx.scale(scale,scale);
    const bounce=Math.sin(runPhase*2)*4;
    const lean=Math.sin(runPhase)*0.08;
    ctx.rotate(lean);
    ctx.translate(0,bounce);

    // 阴影
    ctx.save(); ctx.translate(0,2);
    ctx.scale(1,0.3);
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(0,28,18,8,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // 脚（交替摆动）
    const lfSwing=Math.sin(runPhase)*22;
    const rfSwing=Math.sin(runPhase+Math.PI)*22;
    // 左脚
    ctx.save(); ctx.translate(-7,22);
    ctx.rotate(lfSwing*Math.PI/180);
    ctx.fillStyle='#ff8c00';
    ctx.beginPath(); ctx.roundRect(-3,0,6,10,[1,1,3,3]); ctx.fill();
    ctx.fillStyle='#ff6600';
    ctx.beginPath(); ctx.moveTo(-5,10); ctx.lineTo(-8,14); ctx.lineTo(-1,12); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-1,10); ctx.lineTo(1,15); ctx.lineTo(3,10); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(2,10); ctx.lineTo(6,13); ctx.lineTo(4,10); ctx.closePath(); ctx.fill();
    ctx.restore();
    // 右脚
    ctx.save(); ctx.translate(7,22);
    ctx.rotate(rfSwing*Math.PI/180);
    ctx.fillStyle='#ff8c00';
    ctx.beginPath(); ctx.roundRect(-3,0,6,10,[1,1,3,3]); ctx.fill();
    ctx.fillStyle='#ff6600';
    ctx.beginPath(); ctx.moveTo(-5,10); ctx.lineTo(-8,14); ctx.lineTo(-1,12); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-1,10); ctx.lineTo(1,15); ctx.lineTo(3,10); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(2,10); ctx.lineTo(6,13); ctx.lineTo(4,10); ctx.closePath(); ctx.fill();
    ctx.restore();

    // 身体（黑色外圈）
    const bodyG=ctx.createRadialGradient(-4,-5,2,-4,-5,22);
    bodyG.addColorStop(0,'#3a3a4a'); bodyG.addColorStop(1,'#0a0a14');
    ctx.fillStyle=bodyG;
    ctx.beginPath(); ctx.ellipse(0,2,18,24,0,0,Math.PI*2); ctx.fill();

    // 白肚子
    const bellyG=ctx.createRadialGradient(0,4,0,0,4,13);
    bellyG.addColorStop(0,'#f0f0f0'); bellyG.addColorStop(0.7,'#d8d8e0'); bellyG.addColorStop(1,'#b0b0c0');
    ctx.fillStyle=bellyG;
    ctx.beginPath(); ctx.ellipse(0,6,10,14,0,0,Math.PI*2); ctx.fill();

    // 左翅膀
    const lwSwing=Math.sin(runPhase+Math.PI)*18;
    ctx.save(); ctx.translate(-17,2);
    ctx.rotate((-30+lwSwing)*Math.PI/180);
    const lwG=ctx.createLinearGradient(0,0,-10,12);
    lwG.addColorStop(0,'#1a1a28'); lwG.addColorStop(1,'#0a0a14');
    ctx.fillStyle=lwG;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(-5,-4,-12,2,-10,14);
    ctx.bezierCurveTo(-8,18,-2,14,2,8); ctx.bezierCurveTo(4,4,2,2,0,0); ctx.closePath(); ctx.fill();
    ctx.restore();
    // 右翅膀
    const rwSwing=Math.sin(runPhase)*18;
    ctx.save(); ctx.translate(17,2);
    ctx.rotate((30+rwSwing)*Math.PI/180);
    ctx.fillStyle='#1a1a28';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(5,-4,12,2,10,14);
    ctx.bezierCurveTo(8,18,2,14,-2,8); ctx.bezierCurveTo(-4,4,-2,2,0,0); ctx.closePath(); ctx.fill();
    ctx.restore();

    // 头部
    const headG=ctx.createRadialGradient(-2,-32,1,-2,-32,14);
    headG.addColorStop(0,'#2e2e3e'); headG.addColorStop(1,'#0a0a14');
    ctx.fillStyle=headG;
    ctx.beginPath(); ctx.ellipse(0,-30,13,15,0,0,Math.PI*2); ctx.fill();

    // 白脸（正面圆形）
    ctx.fillStyle='#e8e8e8';
    ctx.beginPath(); ctx.ellipse(0,-29,8,9,0,0,Math.PI*2); ctx.fill();

    // 眼睛
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(-5,-31,3.5,3.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,-31,3.5,3.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(-5,-31,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-31,2,0,Math.PI*2); ctx.fill();
    // 眼睛高光
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(-4.2,-31.8,0.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5.8,-31.8,0.8,0,Math.PI*2); ctx.fill();

    // 嘴巴（黄色三角嘴）
    ctx.fillStyle='#ffcc00';
    ctx.strokeStyle='#cc8800'; ctx.lineWidth=0.6;
    ctx.beginPath();
    ctx.moveTo(-5,-26); ctx.lineTo(0,-23); ctx.lineTo(5,-26);
    ctx.quadraticCurveTo(0,-28,-5,-26); ctx.closePath(); ctx.fill(); ctx.stroke();

    // 头顶光泽
    ctx.fillStyle='rgba(100,100,130,0.2)';
    ctx.beginPath(); ctx.ellipse(-2,-35,6,4,-0.3,0,Math.PI*2); ctx.fill();

    ctx.restore();
  }

  // ── 5b. 法老/骷髅追击者──────────────────────────────────────
  function drawPharaoh(px,py,scale){
    ctx.save(); ctx.translate(px,py); ctx.scale(scale,scale);
    const bsway=Math.sin(t*4)*0.06;
    ctx.rotate(bsway);

    // 阴影
    ctx.save(); ctx.translate(0,2); ctx.scale(1,0.25);
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.ellipse(0,42,26,10,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // 袍子（暗红色长袍）
    const robeG=ctx.createLinearGradient(-20,0,20,0);
    robeG.addColorStop(0,'#1a0000'); robeG.addColorStop(0.4,'#3a0800'); robeG.addColorStop(1,'#1a0000');
    ctx.fillStyle=robeG;
    ctx.beginPath();
    ctx.moveTo(-18,-5); ctx.bezierCurveTo(-24,10,-26,28,-20,42);
    ctx.lineTo(20,42); ctx.bezierCurveTo(26,28,24,10,18,-5); ctx.closePath(); ctx.fill();

    // 袍子裂纹/纹理
    ctx.strokeStyle='rgba(100,30,0,0.5)'; ctx.lineWidth=0.7;
    ctx.beginPath(); ctx.moveTo(-5,-3); ctx.lineTo(-8,42); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,-3); ctx.lineTo(8,42); ctx.stroke();

    // 骨质双臂（向前伸出威胁感）
    const larmRot=(Math.sin(t*4)+0.5)*25;
    const rarmRot=(Math.sin(t*4+Math.PI)+0.5)*25;
    // 左臂
    ctx.save(); ctx.translate(-18,2);

  ctx.save();
  const sweepX=((t*0.15)%1.4-0.2)*BW;
  const sweepG=ctx.createLinearGradient(sweepX-30,0,sweepX+30,0);
  sweepG.addColorStop(0,'transparent');
  sweepG.addColorStop(0.5,'rgba(255,220,100,0.04)');
  sweepG.addColorStop(1,'transparent');
  ctx.fillStyle=sweepG; ctx.fillRect(0,0,BW,BH);
  ctx.restore();
}

// ── DEATH SCREEN ──────────────────────────────────────────────
// 辅助：绘制石板风格圆角矩形按钮，返回是否悬停
function drawStoneBtn(x, y, w, h, text, hovered, alpha){
  ctx.save();
  ctx.globalAlpha = alpha;

  // 按钮背景（石板纹理感）
  const grad = ctx.createLinearGradient(x, y, x, y+h);
  if(hovered){
    grad.addColorStop(0,'#6a4010');
    grad.addColorStop(0.4,'#4a2c08');
    grad.addColorStop(1,'#2e1a04');
  } else {
    grad.addColorStop(0,'#5a3408');
    grad.addColorStop(0.4,'#3c2206');
    grad.addColorStop(1,'#221404');
  }
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 10);
  ctx.fillStyle = grad; ctx.fill();

  // 外发光边框
  ctx.shadowColor = hovered ? '#ffd700' : '#a06010';
  ctx.shadowBlur = hovered ? 18 : 8;
  ctx.strokeStyle = hovered ? 'rgba(255,210,60,0.7)' : 'rgba(160,100,20,0.5)';
  ctx.lineWidth = hovered ? 2 : 1.5;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // 内高光（顶部浅色线）
  ctx.strokeStyle = 'rgba(255,200,80,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x+12, y+3); ctx.lineTo(x+w-12, y+3); ctx.stroke();

  // 按钮文字
  ctx.font = `bold ${h*0.42|0}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const tg = ctx.createLinearGradient(x, y+h*0.2, x, y+h*0.8);
  tg.addColorStop(0, '#fff8d0');
  tg.addColorStop(1, '#ffcc44');
  ctx.fillStyle = tg;
  ctx.shadowColor = hovered ? '#ffdd00' : '#cc8800';
  ctx.shadowBlur = hovered ? 12 : 6;
  ctx.fillText(text, x+w/2, y+h/2+1);
  ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';

  ctx.restore();
}

function drawDead(){
  // deathTimer 倒数到0停止（驱动过渡遮罩）
  if(deathTimer > 0) deathTimer--;
  // deadElapsed 无限递增（驱动所有面板动画）
  deadElapsed++;

  // 死亡过渡：渐变黑色遮罩
  const darkProgress = Math.min(1, (140 - deathTimer) / 55);
  ctx.fillStyle = `rgba(8,3,0,${darkProgress * 0.92})`;
  ctx.fillRect(0, 0, BW, BH);

  // 前45帧只播过渡动画（deadElapsed < 46）
  if(deadElapsed < 46) return;

  // 面板动画用 elapsed（从0开始，无上限）
  const elapsed = deadElapsed - 45;

  // 整体淡入
  const al = Math.min(1, elapsed / 25);
  ctx.save(); ctx.globalAlpha = al;

  // ── 标题弹跳落下
  const titleProgress = Math.min(1, elapsed / 20);
  const bounce = titleProgress < 0.7
    ? titleProgress / 0.7
    : 1 + Math.sin((titleProgress - 0.7) / 0.3 * Math.PI) * 0.12 * (1 - (titleProgress - 0.7) / 0.3);
  const titleY = 80 + bounce * 130;

  ctx.shadowColor = '#cc3300'; ctx.shadowBlur = 35;
  ctx.font = 'bold 52px Arial'; ctx.textAlign = 'center';
  const gg = ctx.createLinearGradient(0, titleY-48, 0, titleY+4);
  gg.addColorStop(0, '#ffe8a0'); gg.addColorStop(0.5, '#dd6600'); gg.addColorStop(1, '#881a00');
  ctx.fillStyle = gg; ctx.fillText('💀 被抓到了！', BW/2, titleY);
  ctx.shadowBlur = 0;

  // ── 结算面板
  const panelX = BW/2-170, panelY = 230, panelW = 340, panelH = 310;

  const panelBg = ctx.createLinearGradient(panelX, panelY, panelX, panelY+panelH);
  panelBg.addColorStop(0, 'rgba(18,9,2,0.96)');
  panelBg.addColorStop(1, 'rgba(10,5,1,0.96)');
  ctx.beginPath(); ctx.roundRect(panelX, panelY, panelW, panelH, 14);
  ctx.fillStyle = panelBg; ctx.fill();

  ctx.shadowColor = '#7a4800'; ctx.shadowBlur = 20;
  ctx.strokeStyle = 'rgba(180,120,25,0.6)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(panelX, panelY, panelW, panelH, 14); ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.strokeStyle = 'rgba(100,65,15,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(panelX+5, panelY+5, panelW-10, panelH-10, 10); ctx.stroke();

  ctx.strokeStyle = 'rgba(200,145,30,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(panelX+20, panelY+42); ctx.lineTo(panelX+panelW-20, panelY+42); ctx.stroke();

  ctx.font = 'bold 15px Arial'; ctx.fillStyle = '#c8900a'; ctx.textAlign = 'center';
  ctx.shadowColor = '#aa6600'; ctx.shadowBlur = 8;
  ctx.fillText('— 本局战绩 —', BW/2, panelY+30);
  ctx.shadowBlur = 0;

  // ── 逐项计分动画（每30帧显示一项）
  const items = [
    { label:'📏 探险距离', value: scoreAnim.distScore,  color:'#ffd060' },
    { label:'💰 宝物收集', value: scoreAnim.coinScore,  color:'#ffd700' },
    { label:'🔥 连击加成', value: scoreAnim.comboBonus, color:'#ff9955' },
  ];

  items.forEach((item, i) => {
    const itemStart = 25 + i * 30;
    if(elapsed < itemStart) return;
    const itemElapsed = elapsed - itemStart;
    const slideIn = Math.min(1, itemElapsed / 18);
    const ease = 1 - Math.pow(1 - slideIn, 3);
    const ox = (1 - ease) * 70;

    ctx.save();
    ctx.globalAlpha = al * ease;
    const rowY = panelY + 70 + i * 72;

    const rowBg = ctx.createLinearGradient(panelX+10, 0, panelX+panelW-10, 0);
    rowBg.addColorStop(0,    'rgba(50,28,5,0)');
    rowBg.addColorStop(0.12, 'rgba(50,28,5,0.4)');
    rowBg.addColorStop(0.88, 'rgba(50,28,5,0.4)');
    rowBg.addColorStop(1,    'rgba(50,28,5,0)');
    ctx.fillStyle = rowBg;
    ctx.beginPath(); ctx.roundRect(panelX+10+ox, rowY-20, panelW-20, 52, 6); ctx.fill();

    ctx.font = '14px Arial'; ctx.fillStyle = 'rgba(210,165,70,0.92)';
    ctx.textAlign = 'left';
    ctx.fillText(item.label, panelX+22+ox, rowY+6);

    const numProg = Math.min(1, Math.max(0, (itemElapsed - 5) / 16));
    const displayVal = Math.round(item.value * (1 - Math.pow(1 - numProg, 2)));
    ctx.font = 'bold 26px Arial'; ctx.fillStyle = item.color;
    ctx.shadowColor = item.color; ctx.shadowBlur = 12;
    ctx.textAlign = 'right';
    ctx.fillText(displayVal + ' 分', panelX+panelW-18+ox, rowY+8);
    ctx.shadowBlur = 0;

    if(i < 2){
      ctx.strokeStyle = 'rgba(120,75,15,0.3)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(panelX+20+ox, rowY+32); ctx.lineTo(panelX+panelW-20+ox, rowY+32);
      ctx.stroke();
    }
    ctx.restore();
  });

  // ── 总分
  const totalStart = 25 + 3 * 30; // elapsed=115
  if(elapsed >= totalStart){
    const td = elapsed - totalStart;
    const tp = Math.min(1, td / 22);
    const tEase = 1 - Math.pow(1 - tp, 3);

    ctx.save(); ctx.globalAlpha = al * tEase;

    const totalY = panelY + panelH - 58;

    const tBg = ctx.createLinearGradient(panelX, 0, panelX+panelW, 0);
    tBg.addColorStop(0,   'rgba(90,55,5,0)');
    tBg.addColorStop(0.15,'rgba(110,68,8,0.75)');
    tBg.addColorStop(0.85,'rgba(110,68,8,0.75)');
    tBg.addColorStop(1,   'rgba(90,55,5,0)');
    ctx.fillStyle = tBg;
    ctx.fillRect(panelX, totalY-24, panelW, 58);

    ctx.strokeStyle = 'rgba(200,145,30,0.5)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(panelX+20, totalY-24); ctx.lineTo(panelX+panelW-20, totalY-24); ctx.stroke();

    ctx.font = '14px Arial'; ctx.fillStyle = 'rgba(230,185,75,0.95)'; ctx.textAlign = 'left';
    ctx.fillText('🏆 本局总分', panelX+22, totalY+4);

    const totalProg = Math.min(1, Math.max(0, (td - 5) / 18));
    const totalDisplay = Math.round(scoreAnim.totalScore * (1 - Math.pow(1 - totalProg, 2)));
    ctx.font = 'bold 30px Arial';
    const tNumG = ctx.createLinearGradient(0, totalY-18, 0, totalY+10);
    tNumG.addColorStop(0, '#fffacc'); tNumG.addColorStop(1, '#ffbb00');
    ctx.fillStyle = tNumG;
    ctx.shadowColor = '#dd9900'; ctx.shadowBlur = 20;
    ctx.textAlign = 'right';
    ctx.fillText(totalDisplay + ' 分', panelX+panelW-18, totalY+8);
    ctx.shadowBlur = 0;

    if(scoreAnim.isNewRecord && tp > 0.8){
      const pulse = 0.8 + Math.sin(frame * 0.12) * 0.2;
      ctx.globalAlpha = al * tEase * pulse;
      ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
      ctx.fillStyle = '#ffe060';
      ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 22;
      ctx.fillText('⭐ 新纪录！', BW/2, totalY + 36);
      ctx.shadowBlur = 0;
    }

    ctx.restore();
  }

  ctx.restore();

  // ── 再来一次 按钮（elapsed >= 155 出现，约总分动画后1.5秒）
  const btnStart = totalStart + 40; // elapsed=155
  if(elapsed >= btnStart){
    const btnW = 240, btnH = 52;
    const btnX = BW/2 - btnW/2, btnY = BH - 88;
    const btnProgress = Math.min(1, (elapsed - btnStart) / 20);
    const btnAlpha = 1 - Math.pow(1 - btnProgress, 3);

    const hovering = mouseX >= btnX && mouseX <= btnX+btnW && mouseY >= btnY && mouseY <= btnY+btnH;
    canvas.style.cursor = hovering ? 'pointer' : 'default';

    // 脉冲发光边框增强
    const pulse = 0.25 + Math.sin(frame * 0.10) * 0.2;
    const pulseOuter = 0.5 + Math.sin(frame * 0.08) * 0.35;
    ctx.save();
    ctx.globalAlpha = btnAlpha * pulseOuter;
    ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 28 + Math.sin(frame*0.1)*12;
    ctx.strokeStyle = `rgba(255,200,40,${0.5+Math.sin(frame*0.1)*0.3})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.roundRect(btnX-4, btnY-4, btnW+8, btnH+8, 14); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = btnAlpha * pulse;
    ctx.shadowColor = '#dd9900'; ctx.shadowBlur = 32;
    ctx.fillStyle = 'rgba(200,130,0,0.05)';
    ctx.beginPath(); ctx.roundRect(btnX-10, btnY-10, btnW+20, btnH+20, 18); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();

    drawStoneBtn(btnX, btnY, btnW, btnH, '▶  再来一次', hovering, btnAlpha);

    ctx.save();
    ctx.globalAlpha = btnAlpha * 0.55;
    ctx.font = '13px Arial'; ctx.fillStyle = '#aa8040'; ctx.textAlign = 'center';
    ctx.fillText('👆 点击按钮继续', BW/2, btnY + btnH + 22);
    ctx.restore();
  }
}

// ── LOOP ──────────────────────────────────────────────────────
let lastT=0;
function loop(ts){
  try {
  const dt=Math.min((ts-lastT)/16.67,3); lastT=ts; frame++;
  ctx.clearRect(0,0,BW,BH);
  ctx.save();
  if(shake.i>.3) ctx.translate(shake.x,shake.y);

  // 摄像机bob (horizon偏移) + 转弯tilt
  const origHorizon = CAM.horizon;
  if(state===ST.PLAY){
    CAM.horizon = origHorizon + camBobY + camHorizonPush;
    if(Math.abs(camTilt)>0.0008){
      ctx.translate(BW/2, CAM.horizon);
      ctx.rotate(camTilt);
      ctx.translate(-BW/2, -CAM.horizon);
    }
  }

  drawSky();

  if(state===ST.PLAY||state===ST.DEAD){
    if(state===ST.PLAY) updateAll();
    drawRoad();
    [...coinArr].filter(c=>!c.done).sort((a,b)=>b.z-a.z).forEach(drawCoin);
    [...pups].filter(p=>!p.done).sort((a,b)=>b.z-a.z).forEach(drawPup);
    [...obs].sort((a,b)=>b.z-a.z).forEach(o=>{
      if(o.type===OT.OBELISK||o.type===OT.SCARAB||o.type===OT.GATE) drawObsExtra(o);
      else drawObs(o);
    });
    // 法老在障碍物后面、企鹅前面绘制（透视：法老在后方）
    drawPharaoh();
    // 死亡后企鹅静止显示（不闪烁），游戏中企鹅正常
    if(state===ST.PLAY || (state===ST.DEAD && deathTimer>80)) drawPenguin();

    // 尘埃粒子（死亡时停止移动）
    ctx.save();
    SNOW.forEach(sf=>{
      if(state===ST.PLAY){
        sf.wobble += sf.wobbleSpd;
        sf.x += sf.vx-(sm-1)*.32 + Math.sin(sf.wobble)*0.35;
        sf.y += sf.vy;
        if(sf.y>BH+5){sf.y=-8;sf.x=Math.random()*BW;}
        if(sf.x<-5)sf.x=BW+5; if(sf.x>BW+5)sf.x=-5;
      }
      ctx.globalAlpha=sf.a*.68;
      const rc=155+Math.random()*45|0, gc=112+Math.random()*32|0, bc=48+Math.random()*24|0;
      ctx.fillStyle=`rgba(${rc},${gc},${bc},1)`;
      ctx.beginPath();
      ctx.ellipse(sf.x,sf.y,sf.r,sf.r*.55,sf.wobble,0,Math.PI*2);
      ctx.fill();
    });
    ctx.restore();

    // particles（死亡爆炸粒子继续播放完，之后停止）
    ctx.save();
    parts.forEach(p=>{
      if(p.life>0){
        ctx.globalAlpha=p.life; ctx.fillStyle=p.c;
        if(p.star){
          ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot+(1-p.life)*2.5);
          const sr=p.r*p.life;
          ctx.beginPath();
          for(let si=0;si<5;si++){
            const a1=si*Math.PI*2/5-Math.PI/2, a2=a1+Math.PI/5;
            if(si===0) ctx.moveTo(Math.cos(a1)*sr,Math.sin(a1)*sr);
            else        ctx.lineTo(Math.cos(a1)*sr,Math.sin(a1)*sr);
            ctx.lineTo(Math.cos(a2)*sr*0.4,Math.sin(a2)*sr*0.4);
          }
          ctx.closePath(); ctx.fill(); ctx.restore();
        } else {
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
        }
      }
    });
    ctx.restore();

    // ── 加速道具激活：全屏放射速度线特效 ──────────────────────────────
    if(boostEffectTimer>0 && state===ST.PLAY){
      boostEffectTimer--;
      const bprog=boostEffectTimer/90;
      ctx.save();
      for(let li=0;li<22;li++){
        const a=li*Math.PI*2/22+frame*0.07;
        const inn=28+bprog*18, out2=75+bprog*(170+Math.sin(li*0.85)*55);
        const lx1=BW/2+Math.cos(a)*inn, ly1=BH/2+Math.sin(a)*inn;
        const lx2=BW/2+Math.cos(a)*out2, ly2=BH/2+Math.sin(a)*out2;
        const slG=ctx.createLinearGradient(lx1,ly1,lx2,ly2);
        slG.addColorStop(0,`rgba(255,200,40,${(bprog*0.82).toFixed(3)})`);
        slG.addColorStop(0.45,`rgba(255,110,0,${(bprog*0.42).toFixed(3)})`);
        slG.addColorStop(1,'transparent');
        ctx.globalAlpha=bprog*0.68; ctx.strokeStyle=slG; ctx.lineWidth=1.2+bprog*1.8;
        ctx.beginPath(); ctx.moveTo(lx1,ly1); ctx.lineTo(lx2,ly2); ctx.stroke();
      }
      ctx.globalAlpha=bprog*0.2;
      const fG=ctx.createRadialGradient(BW/2,BH/2,0,BW/2,BH/2,100*bprog);
      fG.addColorStop(0,'rgba(255,220,80,0.9)'); fG.addColorStop(0.5,'rgba(255,120,20,0.4)'); fG.addColorStop(1,'transparent');
      ctx.fillStyle=fG; ctx.beginPath(); ctx.arc(BW/2,BH/2,100*bprog,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.restore();
    }

    // popups（死亡时淡出停止）
    if(state===ST.PLAY){
      ctx.save();
      popups.forEach(p=>{
        ctx.globalAlpha=p.life; ctx.shadowColor=p.color; ctx.shadowBlur=8;
        ctx.font=`bold ${(14*Math.min(1,p.life*2))|0}px Arial`;
        ctx.fillStyle=p.color; ctx.textAlign='center';
        ctx.fillText(p.text,p.x,p.y);
      });
      ctx.restore();
    }
  }

  // 暗角（神庙幽暗边缘）
  const vig=ctx.createRadialGradient(BW/2,BH/2,BH*.3,BW/2,BH/2,BH*.8);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(5,2,0,.65)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,BW,BH);

  // ── 受击/死亡屏幕边缘闪光（生命减少/护盾破碎时触发）────────
  if(screenFlash > 0){
    const fa = (screenFlash/32)*0.5;
    // 径向边缘渐变
    const eg=ctx.createRadialGradient(BW/2,BH/2,BH*.12,BW/2,BH/2,BH*.88);
    eg.addColorStop(0,'transparent');
    eg.addColorStop(0.65,`rgba(200,20,0,${(fa*0.55).toFixed(3)})`);
    eg.addColorStop(1,`rgba(255,0,0,${fa.toFixed(3)})`);
    ctx.fillStyle=eg; ctx.fillRect(0,0,BW,BH);
    // 四角额外强化
    [[0,0],[BW,0],[0,BH],[BW,BH]].forEach(([cx2,cy2])=>{
      const cg2=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,BH*0.42);
      cg2.addColorStop(0,`rgba(255,30,0,${(fa*0.72).toFixed(3)})`);
      cg2.addColorStop(1,'transparent');
      ctx.fillStyle=cg2; ctx.fillRect(0,0,BW,BH);
    });
    screenFlash--;
  }

  // 法老危险追击：边缘血红压迫光
  if(state===ST.PLAY && pharaoh.catchTimer > 0) {
    const danger = pharaoh.catchTimer / PHARAOH_CATCH_FRAMES;
    const pulse  = 0.5 + Math.sin(pharaoh.warningFlash * 4) * 0.5;
    const alpha  = danger * 0.55 * pulse;
    const catchVig = ctx.createRadialGradient(BW/2, BH/2, BH*0.25, BW/2, BH/2, BH*0.75);
    catchVig.addColorStop(0, 'transparent');
    catchVig.addColorStop(1, `rgba(220,20,20,${alpha.toFixed(3)})`);
    ctx.fillStyle = catchVig;
    ctx.fillRect(0, 0, BW, BH);
    // 顶部和底部额外血色横条（追上的感觉）
    const barAlpha = danger * 0.4 * pulse;
    ctx.fillStyle = `rgba(180,0,0,${barAlpha.toFixed(3)})`;
    ctx.fillRect(0, 0, BW, 6 + danger * 12);
    ctx.fillRect(0, BH - 6 - danger * 12, BW, 6 + danger * 12);
  }

  drawHUD();
  if(state===ST.MENU){ drawRoad(); drawMenu(); }
  else if(state===ST.DEAD) drawDead();

  // 恢复horizon
  CAM.horizon = origHorizon;

  ctx.restore();
  } catch(e){ console.error('[游戏错误]',e); ctx.restore(); }
  requestAnimationFrame(loop);
}

initSegs();
requestAnimationFrame(ts=>{ lastT=ts; requestAnimationFrame(loop); });

// 鼠标移动：跟踪鼠标在canvas的相对位置
canvas.addEventListener('mousemove', e=>{
  const rect = canvas.getBoundingClientRect();
  const scaleX = BW / rect.width;
  const scaleY = BH / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;
});

canvas.addEventListener('click', e=>{
  if(state===ST.MENU){ startGame(); return; }
  if(state===ST.DEAD){
    // 按钮在 deadElapsed >= 45+155=200 帧后出现
    const elapsed = deadElapsed - 45;
    const totalStart = 25 + 3 * 30; // 115
    const btnStart = totalStart + 40;  // 155
    if(elapsed < btnStart) return; // 按钮还没出现，点击无效

    const btnW = 240, btnH = 52;
    const btnX = BW/2 - btnW/2, btnY = BH - 88;
    const rect = canvas.getBoundingClientRect();
    const scaleX = BW / rect.width;
    const scaleY = BH / rect.height;
    const cx = (e.clientX - rect.left) * scaleX;
    const cy = (e.clientY - rect.top) * scaleY;
    // 只有点击在按钮区域内才重启
    if(cx >= btnX && cx <= btnX+btnW && cy >= btnY && cy <= btnY+btnH){
      startGame();
    }
  }
});
</script>
